name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to release"
        required: true
        default: "main"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ── PyPI: build wheel + publish ──────────────────────────
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          pip install --upgrade build
          cd sdk && python -m build
      - name: Publish (trusted publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
          # Uses PyPI trusted publisher; no API token in repo secrets needed
          # once the publisher is configured at https://pypi.org/manage/project/synapserun/settings/publishing/

  # ── npm: publish JS SDK ─────────────────────────────────
  # Uses npm Trusted Publishers (OIDC) — no NODE_AUTH_TOKEN secret.
  # Configure the publisher once at:
  #   https://www.npmjs.com/package/@runsynapse/sdk/access  →  Trusted publishing
  # Required: Node >= 22.14.0, npm >= 11.5.1. Provenance is automatic.
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ensure npm CLI >= 11.5.1
        run: npm install -g npm@latest
      - name: Build + publish via Trusted Publisher OIDC
        run: |
          cd sdk/js
          npm ci
          npm run build --if-present
          npm publish --access public

  # ── GHCR: container image for self-hosted gateway ───────
  ghcr:
    name: Publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/synapse-run/cell
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub release: changelog notes ─────────────────────
  github-release:
    name: GitHub release notes
    runs-on: ubuntu-latest
    needs: [pypi, npm, ghcr]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
