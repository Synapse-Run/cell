name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust Gateway ──────────────────────────────────────────
  gateway-build:
    name: Build Gateway (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
      - name: Build
        run: cargo build --release --no-default-features
        working-directory: gateway
      - name: Run tests
        run: cargo test --no-default-features
        working-directory: gateway

  # ── Python SDK ────────────────────────────────────────────
  sdk-test:
    name: Test Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK
        run: pip install -e ".[all]"
        working-directory: sdk
      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/benchmark_compare.py --ignore=tests/benchmark_e2b.py
        working-directory: sdk

  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python SDK
        # cd into sdk so ruff finds sdk/pyproject.toml [tool.ruff] config,
        # which excludes vendored CPython under synapse/_templates/.
        run: cd sdk && ruff check synapse/
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Clippy
        run: cargo clippy --no-default-features -- -D warnings
        working-directory: gateway
      - name: Rustfmt
        run: cargo fmt -- --check
        working-directory: gateway

  # ── JS SDK ────────────────────────────────────────────────
  js-test:
    name: Test JS SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sdk/js/package-lock.json
      - name: Install
        run: npm ci
        working-directory: sdk/js
      - name: Build (if build script present)
        run: npm run build --if-present
        working-directory: sdk/js
      - name: Test (if test script present)
        run: npm test --if-present
        working-directory: sdk/js

  # ── Military Audit ────────────────────────────────────────
  # Runs the Red Team latency + path traversal + SSRF audit on the built
  # PyO3 wheel. Gated on sdk-test passing.
  military-audit:
    name: Military Audit (security)
    runs-on: ubuntu-latest
    needs: [sdk-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
      - name: Build PyO3 wheel
        run: |
          pip install --upgrade maturin
          maturin develop --release
        working-directory: gateway
      - name: Install SDK
        run: pip install -e .
        working-directory: sdk
      - name: Run Military Audit
        run: python run_test.py
