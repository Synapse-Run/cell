version: 2
updates:
  - package-ecosystem: cargo
    directory: /gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: cargo
    directory: /mesh-signaling
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directory: /sdk
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: /sdk/js
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: /command-center
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript", "frontend"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
